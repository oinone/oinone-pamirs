file.template.user.tips=1. Red indicates a required field.\n2. If there are multiple "Role Codes", separate them with a semi-colon ";". Ensure each bound code is a valid code already existing in the system.\n3. Non-Chinese numbers must include the country code and a "+" sign, e.g., US number: +1**********.\n4. Account Activation: Enter "Yes" or leave blank for activation; enter "No" for non-activation.\n5. Initial password must be 8 to 32 characters long; if left blank, defaults to "Abcd@1234".\n6. The contact phone and email here can be used for SMS verification code login and email login.\n7. Login account and initial password are used to create a new user or bind to an existing user.
