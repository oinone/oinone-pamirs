file.template.user.tips=1.红色为必填字段。\n2.若存在多个“角色编码”用英文 “;” 分割，请确保填写的每个被绑定的编码都是系统中已存在的有效编码。\n3.非中国号码务必加上国家代码以及+号，例如美国号码：+1**********。\n4.是否激活账号，填写“是”或留空表示激活，填写“否”表示不激活。\n5.初始密码需为8至32位；如未填写，则默认为“Abcd@1234”。\n6.此处的联系电话和邮箱可用于手机验证码登录和邮箱登录。\n7.登录账号和初始密码的作用是用于创建新用户或绑定现有用户。
