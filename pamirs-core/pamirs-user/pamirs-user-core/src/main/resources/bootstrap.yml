server:
  port: 8099
  address: 0.0.0.0
  sessionTimeout: 3600

spring:
  profiles:
    active: dev
  application:
    name: pamirs-framework-boot

pamirs:
  default:
    environment-check: true
    tenant-check: true

---
spring:
  profiles: dev
  cloud:
    config:
      enabled: false
      uri: http://127.0.0.1:7001
      label: master
      profile: dev
    nacos:
      config:
        enabled: false
        server-addr: http://127.0.0.1:8848
        file-extension: yml
  dubbo:
    application:
      name: ${spring.application.name}
      version: 1.0.0
    registry:
      address: zookeeper://127.0.0.1:2181
    protocol:
      name: dubbo
      port: 20888
    scan: pro.shushi.pamirs

---
spring:
  profiles: test
  cloud:
    config:
      enabled: false
      uri: http://127.0.0.1:7001
      label: master
      profile: test
    nacos:
      config:
        enabled: true
        server-addr: http://127.0.0.1:8848
        file-extension: yml
  dubbo:
    application:
      name: ${spring.application.name}
      version: 1.0.0
    registry:
      address: zookeeper://127.0.0.1:2181
    protocol:
      name: dubbo
      port: 20888
    scan: pro.shushi.pamirs

