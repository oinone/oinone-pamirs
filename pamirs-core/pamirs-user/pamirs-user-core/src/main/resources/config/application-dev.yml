spring:
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 2000
    #    cluster:
    #      nodes: 127.0.0.1:6379
    #      timeout: 2000
    #      max-redirects: 7
    jedis:
      pool:
        # 连接池中的最大空闲连接 默认8
        max-idle: 8
        # 连接池中的最小空闲连接 默认0
        min-idle: 0
        # 连接池最大连接数 默认8 ，负数表示没有限制
        max-active: 8
        # 连接池最大阻塞等待时间（使用负值表示没有限制） 默认-1
        max-wait: -1
pamirs:
  datasource:
    pamirs:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/pamirs?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
  sharding:
    pamirs:
      names: pamirs
      shardingRule:
        defaultDataSourceName: pamirs
      props:
        sql.show: true
  mapper:
    enhance:
      default:
        pamirs-config:
          global-table-info:
            logic-delete: true
            logic-delete-column: is_deleted
            logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
            logic-not-delete-value: 0
            optimistic-locker: false
            keyGenerator: AUTO_INCREMENT
        global-config:
          #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
          id-type: 2
          #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
          field-strategy: 0
          #驼峰下划线转换
          db-column-underline: true
          #刷新mapper 调试神器
          refresh-mapper: true
          #数据库大写下划线转换
          #capital-mode: true
          #序列接口实现类配置
          #key-generator: pro.shushi.pamirs.framework.connectors.data.plugin.xxx
          #自定义SQL注入器
          sql-injector: pro.shushi.pamirs.framework.connectors.data.plugin.MyLogicSqlInjector
        configuration:
          map-underscore-to-camel-case: true
          cache-enabled: false
        mapper-locations:
          - classpath*:/mapper/system.xml
          - classpath*:/mapper/meta.xml
          - classpath*:/mapper/common.xml
          - classpath*:/mapper/bidmapper.xml
        plugins:
          - name: optimisticLockerInterceptor
            clazz: pro.shushi.pamirs.framework.connectors.data.plugin.optlock.OptimisticLockerInterceptor
  boot:
    autoInstall: true
    upgrade: auto
    tenants:
      - pamirs
  mock:
    tenant: pamirs
    preview: false
    appId: base
    userId: 1L
    lang:
