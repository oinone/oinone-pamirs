business.template.employee.desc=1.红色为必填字段。\\n2.员工编码相同新数据直接覆盖旧数据。\\n3.若存在多个“所属部门”、多个“角色编码”用英文 “;” 分割，请确保填写的每个被绑定的编码都是系统中已存在的有效编码。\\n4.初始密码需为8至32位；如未填写，则默认为“Abcd@1234”。\\n5.登录账号和初始密码的作用是用于创建新用户或绑定现有用户。\\n6.同一公司下的员工不允许绑定相同账户。
