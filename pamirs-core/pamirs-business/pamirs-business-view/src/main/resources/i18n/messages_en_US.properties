business.template.employee.desc=1. Fields in red are required.\n2. If the employee code is the same, new data will directly overwrite old data.\n3. If there are multiple "Departments" or multiple "Role Codes", separate them with a semicolon (";"); please ensure that each code you enter is a valid code that already exists in the system.\n4. The initial password must be 8 to 32 characters; if not filled in, the default is "Abcd@1234".\n5. The login account and initial password are used to create a new user or bind an existing user.\n6. Employees within the same company are not allowed to bind the same account.
