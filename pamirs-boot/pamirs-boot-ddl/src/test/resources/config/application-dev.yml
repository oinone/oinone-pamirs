  #分库分表配置
  sharding:
    define:
      data-sources:
        ds:
          - ds0
          - ds1
      modules:
        "[test1]":
          ds-nodes: 0..1
          exclude-models:
            - test.TestSingleModel
      models:
        "[test.Model2]":
          ds-nodes: "['a','b']"
          ds-separator: _
          tables: 0..7
        "[test.TestShardingModel]":
          ds-nodes: 0..1
          tables: 0..7
        "[test.TestModelItem]":
          ds-nodes: 0..1
          tables: 0..7
        "[test.Config]":
          ds-nodes: "[0]"
    rule:
      ds:
        actual-ds:
          - ds0
          - ds1
        sharding-rule:
          tables:
            test_sharding_model:
              actualDataNodes: ds${0..1}.test_sharding_model_${0..7}
              databaseStrategy:
                inline:
                  shardingColumn: create_uid
                  algorithmExpression: ds${create_uid % 2}
              tableStrategy:
                inline:
                  shardingColumn: create_uid
                  algorithmExpression: test_sharding_model_${(create_uid % 16).intdiv(2)}
            model_item:
              actualDataNodes: ds${0..1}.model_item_${0..7}
              databaseStrategy:
                inline:
                  shardingColumn: create_uid
                  algorithmExpression: ds${create_uid % 2}
              tableStrategy:
                inline:
                  shardingColumn: create_uid
                  algorithmExpression: model_item_${(create_uid % 16).intdiv(2)}
          bindingTables:
            - test_sharding_model,model_item
          broadcastTables:
            - config
          defaultDataSourceName: ds0
        props:
          sql.show: true
  #mapper静态配置
  plus:
    configuration:
      map-underscore-to-camel-case: false
      cache-enabled: false
    mapper-locations:
      - classpath*:/mapper/meta.xml
  #mapper低代码配置
  mapper:
    static-model-config-locations:
      - pro.shushi.pamirs
    global:
      table-info:
        logic-delete: true
        logic-delete-column: is_deleted
        logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
        logic-not-delete-value: 0
        optimistic-locker: false
        optimistic-locker-column: opt_version
    ds:
      base:
        table-info:
          logic-delete: false
          logic-delete-column: is_deleted
          logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
          logic-not-delete-value: 0
          optimistic-locker: false
          optimistic-locker-column: opt_version
  boot:
    modules:
      - base
    init: false
    sync-init-meta: true
    auto-install: true

