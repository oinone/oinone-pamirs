TriggerEnvironmentChecker.triggerModuleTip=\n\ntrigger模块启动时需要添加如下配置项\n\n启动工程pom:\n\n<dependency>\n    <groupId>pro.shushi.pamirs.core</groupId>\n    <artifactId>pamirs-trigger-core</artifactId>\n</dependency>\n<dependency>\n    <groupId>pro.shushi.pamirs.core</groupId>\n    <artifactId>pamirs-trigger-bridge-tbschedule</artifactId>\n</dependency>\n\nyaml:\n\npamirs:\n  meta:\n    metaPackages:\n      - pro.shushi.pamirs.trigger.model\n  sharding:\n    define:\n      models:\n        "[trigger.PamirsSchedule]":\n          tables: 0..13\n  event:\n    enabled: true\n    schedule:\n      enabled: true\n\n

