pamirs:
  framework:
    data:
      autoCreateDatabase: true
      default-ds-key: base
  datasource:
    base:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/test911?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds0:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds1:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master_preview?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant2
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
  sharding:
    define:
      modules:
        "[test]":
          ds-nodes: 0..1
      models:
        "[test.TestShardingModel]":
          ds-nodes: "['a','b']"
          tables: 0..7
  #mapper静态配置
  plus:
    configuration:
      map-underscore-to-camel-case: false
      cache-enabled: false
    mapper-locations:
      - classpath*:/mapper/meta.xml
  #mapper低代码配置
  mapper:
    static-model-config-locations:
      - pro.shushi.pamirs
    global:
      table-info:
        logic-delete: true
        logic-delete-column: is_deleted
        logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
        logic-not-delete-value: 0
        optimistic-locker: false
        optimistic-locker-column: opt_version
    ds:
      base:
        table-info:
          logic-delete: true
          logic-delete-column: is_deleted
          logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
          logic-not-delete-value: 0
          #          optimistic-locker: true
          optimistic-locker-column: opt_version
          #驼峰下划线转换
          under-camel: true
          #数据库大写下划线转换
          capital-mode: false
          #字段格式化
          column-format: '`%s`'
          #字段别名格式化
          alias-format: '`%s`'
  mock:
    tenant: pamirs
    preview: false
    appId: base
    userId: 1L
    lang:
