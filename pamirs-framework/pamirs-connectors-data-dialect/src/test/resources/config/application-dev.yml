pamirs:
  framework:
    data:
      autoCreateDatabase: true
      default-ds-key: base
  datasource:
    base:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/test911?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds0:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds1:
      driverClassName: com.mysql.jdbc.Driver
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master_preview?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&autoReconnect=true&ttt=tenant2
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
  #分布式事务
  xa:
    force-shutdown: true
    timeout: 300
  #mapper静态配置
  plus:
    global-config:
      #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
      id-type: 2
      #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
      field-strategy: 0
      #驼峰下划线转换
      db-column-underline: false
      #刷新mapper 调试神器
      refresh-mapper: true
      #数据库大写下划线转换
      capital-mode: true
      #自定义SQL注入器
      sql-injector: pro.shushi.pamirs.framework.connectors.data.plugin.MyLogicSqlInjector
    configuration:
      map-underscore-to-camel-case: false
      cache-enabled: false
    mapper-locations:
      - classpath*:/mapper/meta.xml
  #mapper低代码配置
  mapper:
    static-model-config-locations:
      - pro.shushi.pamirs
    global:
      table-info:
        logic-delete: false
        logic-delete-column: is_deleted
        logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
        logic-not-delete-value: 0
        optimistic-locker: false
        optimistic-locker-column: opt_version
        #驼峰下划线转换
        under-camel: true
        #数据库大写下划线转换
        capital-mode: false
        #字段格式化
        column-format: '`%s`'
        #字段别名格式化
        alias-format: '`%s`'
    ds:
      base:
        table-info:
          logic-delete: false
          logic-delete-column: is_deleted
          logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
          logic-not-delete-value: 0
          optimistic-locker: false
          optimistic-locker-column: opt_version
#分布式事务
