        xa-properties.user: root
        xa-properties.password: shushi@2019
        xa-data-source-class-name: com.alibaba.druid.pool.xa.DruidXADataSource
        unique-resource-name: base
        max-pool-size: 10
        min-pool-size: 1
        max-lifetime: 10000
        borrow-connection-timeout: 10000
      ds0:
        xa-properties.url: jdbc:mysql://127.0.0.1:3306/master?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true&ttt=tenant1
        xa-properties.user: root
