pamirs:
  framework:
    data:
      autoCreateDatabase: true
      default-ds-key: pamirs
  datasource:
    pamirs:
      driverClassName: com.mysql.jdbc.Driver
      beanid: base
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/test911?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds0:
      driverClassName: com.mysql.jdbc.Driver
      beanid: ds0
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant1
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      asyncInit: true
    ds1:
      driverClassName: com.mysql.jdbc.Driver
      beanid: ds1
      type: com.alibaba.druid.pool.DruidDataSource
      url: jdbc:mysql://127.0.0.1:3306/master_preview?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&ttt=tenant2
      username: root
      password: shushi@2019
      initialSize: 5
      maxActive: 200
      minIdle: 5
  sharding:
    pamirs:
      names: pamirs
      shardingRule:
        defaultDataSourceName: pamirs
      props:
        sql.show: true
    master:
      names: ds0, ds1
      shardingRule:
        tables:
          action:
            actualDataNodes: ds${0..1}.foo
            databaseStrategy:
              inline:
                shardingColumn: id
                algorithmExpression: ds${id % 2}
            #            tableStrategy:
            #              inline:
            #                shardingColumn: id
            #                algorithmExpression: ${id % 2}
            keyGenerator:
              type: SNOWFLAKE
              column: id
        bindingTables:
          - foo
        broadcastTables:
          - t_config
        defaultDataSourceName: ds0
        defaultKeyGenerator:
          type: SNOWFLAKE
          column: id
      props:
        sql.show: true
    master_preview:
      names: ds1
      shardingRule:
        defaultDataSourceName: ds1
      props:
        sql.show: true
  mapper:
    common:
      global-config:
        #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
        id-type: 2
        #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
        field-strategy: 0
        #驼峰下划线转换
        db-column-underline: false
        #刷新mapper 调试神器
        refresh-mapper: true
        #数据库大写下划线转换
        #capital-mode: true
        #自定义SQL注入器
        sql-injector: pro.shushi.pamirs.framework.connectors.data.plugin.MyLogicSqlInjector
      configuration:
        map-underscore-to-camel-case: false
        cache-enabled: false
      mapper-locations:
        - classpath*:/mapper/system.xml
        - classpath*:/mapper/meta.xml
        - classpath*:/mapper/common.xml
    enhance:
      default:
        global-table-info:
          logic-delete: true
          logic-delete-column: is_deleted
          logic-delete-value: REPLACE(unix_timestamp(NOW(6)),'.','')
          logic-not-delete-value: 0
          optimistic-locker: true
          optimistic-locker-column: opt_version
  mock:
    tenant: pamirs
    preview: false
    appId: base
    userId: 1L
    lang:
